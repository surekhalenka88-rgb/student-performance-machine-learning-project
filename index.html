<!doctype html>

<html>

<head>
    <title>Student Performance Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>
    <div class="container">
        <h1>🎓 Student Performance Predictor</h1>

        <form action="/predict" method="post">
            <label>Math Score</label>

            <input type="number" name="math" min="0" max="100" placeholder="Enter Math Score" required />

            <label>Reading Score</label>

            <input type="number" name="reading" min="0" max="100" placeholder="Enter Reading Score" required />

            <button type="submit">Predict Writing Score</button>
        </form>

        {% if result %}

        <div class="result">Predicted Writing Score: {{ result }}</div>

        {% endif %}
    </div>
</body>

</html>
